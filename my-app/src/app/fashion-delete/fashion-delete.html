<p>{{errMessage}}</p>
Fashion Id: <input type="text" #_id> 
<button (click)="deleteFashion(_id.value)">Delete Fashion</button>
<table border="1">
    <tr>
        <td>Fashion Id</td>
        <td>Fashion Subject</td>
        <td>Details</td>
        <td>Image</td>
    </tr>
    <tbody>
        <tr *ngFor="let fashion of fashions">
            <td>{{fashion._id}}</td>
            <td>{{fashion.fashion_subject}}</td>
            <td>{{fashion.fashion_detail}} </td>
            <td>
                <img [src]="fashion.fashion_image" width="50px" height="50px">
            </td>
        </tr>
    </tbody>
</table>
