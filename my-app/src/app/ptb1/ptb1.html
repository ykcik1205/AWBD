<p>First Degree Equation</p>
<table>
    <tr>
        <td>Coefficient a:</td>
        <td>
            <input type="text" #input_a>
        </td>
    </tr>
    <tr>
        <td>Coefficient b:</td>
        <td>
            <input type="text" #input_b>
        </td>
    </tr>
    <tr>
        <td>Result:</td>
        <td #result>
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <button (click)="get_solution(input_a.value, input_b.value, result)">Get Result</button>
            <button (click)="clear_data(input_a, input_b, result)">Clear</button>
        </td>
    </tr>
</table>
