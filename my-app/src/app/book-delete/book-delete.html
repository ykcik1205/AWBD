<p>{{errMessage}}</p>
Book Id: <input type="text" #bookId> 
<button (click)="deleteBook(bookId.value)">Delete Book</button>
<table border="1">
    <tr>
        <td>BookId</td>
        <td>BookName</td>
        <td>Price</td>
        <td>Image</td>
    </tr>
    <tbody>
        <tr *ngFor="let book of books">
            <td>{{book.BookId}}</td>
            <td>{{book.BookName}}</td>
            <td>{{book.Price}} </td>
            <td>
                <img src="http://localhost:3000/static/images/{{book.Image}}" width="50px" height="50px">
            </td>
        </tr>
    </tbody>
</table>
