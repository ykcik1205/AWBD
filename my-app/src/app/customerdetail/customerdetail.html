<button (click)="go_back()">Back to List Customer</button>
<table border = "1">
  <tr>
    <td>ID</td>
    <td>{{selected_customer.id}}</td>
  </tr>
  <tr>
    <td>Name</td>
    <td>{{selected_customer.name}}</td>
  </tr>
  <tr>
    <td>Gender</td>
    <td>{{ selected_customer.gender }}</td>
  </tr>
  <tr>
    <td>Image</td>
    <td><img width = "100" height = "100" src="{{selected_customer.image}}" /></td>
  </tr>
  <tr *ngIf="selected_customer">
    <td>{{ selected_customer.id }}</td>
    <td>{{ selected_customer.name }}</td>
    <td>{{ selected_customer.gender }}</td>
    <td><img img width = "100" height = "100" src="{{selected_customer.image}}" /></td>
  </tr>
</table>
