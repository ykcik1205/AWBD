<p>{{errMessage}}</p>
<table>
    <tr>
        <td>Fashion Id:</td>
        <td>
            <input type="text" class="form-control" #name="ngModel" 
            name="FashionId" id="FashionId" placeholder="Enter Fashion Id" 
            [(ngModel)]="fashion._id"/>
        </td>
    </tr>
    <tr>
        <td>Fashion Subject:</td>
        <td>
            <input type="text" class="form-control" #name="ngModel"
            name="FashionSubject" id="FashionSubject" placeholder="Enter Fashion Subject"
            [(ngModel)]="fashion.fashion_subject"/>
        </td>
    </tr>
    <tr>
        <td>Details:</td>
        <td>
            <input type="text" class="form-control" #name="ngModel"
            name="FashionDetails" id="FashionDetails" placeholder="Enter Details"
            [(ngModel)]="fashion.fashion_detail"/>
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <button (click)="putFashion()">Update</button>
        </td>
    </tr>
</table>
<table border="1">
    <tr>
        <td>FashionId</td>
        <td>FashionSubject</td>
        <td>FashionDetails</td>
        <td>Image</td>
    </tr>
    <tbody>
        <tr *ngFor="let fashion of fashions">
            <td>{{fashion._id}}</td>
            <td>{{fashion.fashion_subject}}</td>
            <td>{{fashion.fashion_detail}} </td>
            <td>
                <img [src]="fashion.fashion_image" width="50px" height="50px">
            </td>
        </tr>
    </tbody>
</table>
